server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Real IP from reverse proxy (Cloudflare Tunnel, Docker, etc.)
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Log to stdout/stderr so Docker can capture them
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets with hashed filenames — cache forever since filename changes on build
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Favicon — cache for a week
    location = /favicon.svg {
        expires 1w;
        add_header Cache-Control "public" always;
    }

    # SPA catch-all — index.html must never cache
    location / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;
        try_files $uri $uri/ /index.html;
    }
}
