# Full-stack boilerplate — local development environment
# Requires Docker and Docker Compose v2.22+
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose logs -f backend    # follow backend logs
#   docker compose down -v            # stop and remove volumes

services:
  postgres:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: boilerplate
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d boilerplate"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keydb:
    image: eqalpha/keydb:latest
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - keydb_data:/data
    command: keydb-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://app_user:${DB_PASSWORD:-devpassword}@postgres:5432/boilerplate?sslmode=disable
      KEYDB_ADDR: keydb:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      keydb:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  keydb_data:
